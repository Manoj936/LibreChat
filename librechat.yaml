version: 1.3.4
cache: true
endpoints:
  custom:
    - name: 'Choose your model'
      apiKey: 'sk-litellm-dummy-key'
      baseURL: 'http://litellm:4000/v1'
      models:
        default: ['gpt-4o']
        fetch: true
      titleConvo: true
      titleModel: 'gpt-4o'


interface:
  modelSelect: true
  endpointsMenu: true
  bookmarks: false
  multiConvo: false
  presets: false 
  agents:
    use: false
    share: false
    public: false
  assistants:
    use: false
    prompts:
      use: true
      create: true
      share: false
      public: false
  marketplace:
    use: false

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60  # Rate limit window for file uploads per IP
    userMax: 50
    userWindowInMinutes: 60  # Rate limit window for file uploads per user
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60  # Rate limit window for conversation imports per IP
    userMax: 50
    userWindowInMinutes: 60  # Rate limit window for conversation imports per user
